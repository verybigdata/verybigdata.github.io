---
layout: default
---

{% if page.header-img %}
<header class="page-hero has-image" style="background-image: url('{{ site.baseurl }}/{{ page.header-img }}')">
{% else %}
<header class="page-hero">
{% endif %}
  <div class="page-hero__inner">
    <h1 class="page-hero__title">{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}</h1>
    {% if page.description and page.description != ' ' %}
    <p class="page-hero__subtitle">{{ page.description }}</p>
    {% endif %}
  </div>
</header>

<main class="container">
  {{ content }}
</main>
