<p>Please fill out the form below and I will get back to you as soon as possible.</p>

<form action="https://formspree.io/{{ site.email_username }}" method="post">
  <div class="form-group">
    <label for="name">Name</label>
    <input type="text" id="name" name="name" placeholder="Your full name" required>
  </div>
  <div class="form-group">
    <label for="email">Email</label>
    <input type="email" id="email" name="_replyto" placeholder="your@email.com" required>
  </div>
  <div class="form-group">
    <label for="message">Message</label>
    <textarea id="message" name="message" rows="8" placeholder="Your message" required></textarea>
  </div>
  <input type="hidden" name="_next" value="{{ site.baseurl }}{% link index.html %}">
  <input type="text" name="_gotcha" style="display:none">
  <div class="form-check">
    <input type="checkbox" id="consent" required>
    <label for="consent">Yes, I would like to receive communications by email.</label>
  </div>
  <button type="submit" class="btn btn-primary">Send message</button>
</form>
